<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRI 日记 — {{DATE}}</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <link href="https://fonts.googleapis.com/css2?family=SUSE:wght@400;500;600;700&family=VT323&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-pink: #ec4899;
      --neon-coral: #fb923c;
      --bg-dark: #050510;
      --glass-border: rgba(236, 72, 153, 0.35);
      --glass-bg: rgba(15, 5, 15, 0.75);
    }
    body {
      background-color: var(--bg-dark);
      background-image:
        linear-gradient(rgba(236, 72, 153, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(236, 72, 153, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      color: #fce7f3;
      font-family: 'SUSE', sans-serif;
      min-height: 100vh;
    }
    .font-vt323 { font-family: 'VT323', monospace; font-weight: 100 !important; }
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
    }
    .diary-content h1 {
      font-family: 'VT323', monospace;
      font-size: 1.5rem;
      color: #fda4af;
      letter-spacing: 0.1em;
      margin: 1.5rem 0 0.75rem;
    }
    .diary-content h2 {
      font-family: 'VT323', monospace;
      font-size: 1.25rem;
      color: #fdba74;
      letter-spacing: 0.08em;
      margin: 1.25rem 0 0.5rem;
    }
    .diary-content h3 {
      font-family: 'VT323', monospace;
      font-size: 1.1rem;
      color: #fda4af;
      letter-spacing: 0.06em;
      margin: 1rem 0 0.4rem;
    }
    .diary-content p {
      color: #d1d5db;
      line-height: 1.75;
      margin: 0.6rem 0;
      font-size: 0.9rem;
    }
    .diary-content em {
      color: #f9a8d4;
      font-style: italic;
    }
    .diary-content strong {
      color: #fecdd3;
      font-weight: 600;
    }
    .diary-content blockquote {
      border-left: 3px solid #ec4899;
      padding-left: 1rem;
      margin: 1rem 0;
      color: #9ca3af;
      font-style: italic;
    }
    .diary-content code {
      background: rgba(236, 72, 153, 0.1);
      padding: 0.1rem 0.35rem;
      border-radius: 0.25rem;
      font-family: 'VT323', monospace;
      color: #fda4d4;
      font-size: 0.85em;
    }
    .diary-content a {
      color: #f9a8d4;
      text-decoration: underline;
      text-decoration-color: rgba(249, 168, 212, 0.4);
    }
    .diary-content hr {
      border: none;
      border-top: 1px solid rgba(236, 72, 153, 0.2);
      margin: 1.5rem 0;
    }
  </style>
</head>
<body>
  <div class="max-w-3xl mx-auto px-5 py-10">
    <header class="flex items-start justify-between gap-4 mb-8">
      <div>
        <div class="text-xs text-pink-300/70 font-vt323 tracking-widest">FRI / 日记</div>
        <h1 class="text-2xl sm:text-3xl font-vt323 text-pink-200 tracking-wider">{{TITLE}}</h1>
        <p class="text-[11px] text-gray-500 mt-2">{{DATE}}</p>
      </div>
      <div class="flex gap-2">
        <a href="index.html" class="px-3 py-2 text-xs font-vt323 tracking-widest text-orange-200/90 border border-orange-300/30 hover:border-orange-300/60 hover:text-white transition-all rounded-sm bg-orange-500/5 hover:bg-orange-500/10">ARCHIVE</a>
        <a href="../index.html" class="px-3 py-2 text-xs font-vt323 tracking-widest text-pink-200/90 border border-pink-300/30 hover:border-pink-300/60 hover:text-white transition-all rounded-sm bg-pink-500/5 hover:bg-pink-500/10">HOME</a>
      </div>
    </header>

    <main class="glass-panel rounded-sm p-6">
      <div class="diary-content">
        {{CONTENT}}
      </div>
    </main>

    <footer class="mt-8 text-[11px] text-gray-500">
      last edited: {{DATE}} · keep it real.
    </footer>
  </div>
</body>
</html>
